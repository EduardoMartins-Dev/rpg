name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Testcontainers + Flyway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Docker is preinstalled on ubuntu-latest runners -> Testcontainers works out of the box.
      - name: Run backend tests
        working-directory: backend
        run: ./mvnw -B verify
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend (build + Playwright E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      # Playwright E2E wired in F6 (needs front+back running). Skeleton step:
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps || true
      - name: E2E (placeholder until F6)
        working-directory: frontend
        run: echo "Playwright UI E2E added in F6"
