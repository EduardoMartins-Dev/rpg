name: Keep API warm

# Mantém a instância Render (free) acordada pingando o health.
# Render free dorme após ~15min sem tráfego; a request que acorda recebe HTML 502
# por ~30-50s, o que aparecia no front como "JSON.parse unexpected character".
#
# OBS: o agendador do GitHub Actions é best-effort e pode atrasar; por isso cada
# execução faz vários pings espaçados, cobrindo a janela até a próxima rodada.
# Para garantia maior, um monitor externo (UptimeRobot/cron-job.org) é mais confiável.

on:
  schedule:
    - cron: "*/10 * * * *"   # a cada ~10min
  workflow_dispatch: {}        # permite disparo manual

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health repetidamente
        run: |
          URL="${KEEP_WARM_URL:-https://portal-rpg-api.onrender.com/actuator/health}"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$URL" || echo "000")
            echo "ping $i -> HTTP $code ($URL)"
            if [ "$i" -lt 4 ]; then sleep 120; fi
          done
        env:
          KEEP_WARM_URL: ${{ vars.KEEP_WARM_URL }}
