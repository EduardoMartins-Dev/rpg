# Production — all secrets via env vars, never committed.
# Supabase: DB_URL = jdbc do Session pooler (porta 5432) + ?sslmode=require.
# (fallback p/ partes DB_HOST/DB_PORT/DB_NAME caso use outro Postgres.)
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
logging:
  level:
    root: INFO

app:
  # Bootstrap do admin inicial (ProdSeeder). Defina ADMIN_EMAIL/ADMIN_PASSWORD
  # nas env vars do Render. Sem isso, nenhum admin é criado.
  bootstrap:
    admin-email: ${ADMIN_EMAIL:}
    admin-password: ${ADMIN_PASSWORD:}
    admin-name: ${ADMIN_NAME:Admin}
