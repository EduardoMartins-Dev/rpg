spring:
  application:
    name: portal-rpg
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/portalrpg}
    username: ${DB_USER:portalrpg}
    password: ${DB_PASSWORD:portalrpg}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  auth:
    # false bloqueia novos cadastros (só usuários existentes logam)
    registration-enabled: ${REGISTRATION_ENABLED:true}
  jwt:
    # override in every real env via env var; dev default below is non-secret
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789-abcdef-0123456789}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
  ai:
    # echo (default) = geração mock determinística (tests/dev, sem LLM).
    # groq = geração real via API compatível com OpenAI (ativa o GroqChatModel).
    # gemini = geração via Google Gemini (ativa o GeminiChatModel).
    provider: ${AI_PROVIDER:echo}
    groq:
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:llama-3.3-70b-versatile}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
  embeddings:
    # hashing (default) = embedding lexical determinístico (tests/dev, sem rede).
    # jina = embedding semântico via API da Jina (ativa o JinaEmbeddingModel). Ambos 1024.
    provider: ${EMBEDDINGS_PROVIDER:hashing}
    jina:
      base-url: ${JINA_BASE_URL:https://api.jina.ai/v1}
      api-key: ${JINA_API_KEY:}
      model: ${JINA_MODEL:jina-embeddings-v3}
  storage:
    # none (default) = sem Storage; supabase = upload direto + indexação assíncrona.
    provider: ${STORAGE_PROVIDER:none}
    supabase-url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_BUCKET:rag-books}
